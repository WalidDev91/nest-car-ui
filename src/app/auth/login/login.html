<div class="container mt-5">

  <h2>Login</h2>

  <div class="mb-3">
    <label>Email</label>
    <input
      type="email"
      class="form-control"
      [(ngModel)]="email">
  </div>

  <div class="mb-3">
    <label>Password</label>
    <input
      type="password"
      class="form-control"
      [(ngModel)]="password">
  </div>

  <button
    class="btn btn-primary"
    (click)="login()">
    Login
  </button>

</div>
