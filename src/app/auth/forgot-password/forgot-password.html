<main class="d-flex w-100">
    <div class="container d-flex flex-column">
        <div class="row vh-100">
            <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">

                    <div class="text-center mt-4">
                        <h1 class="h2">Forgot Password</h1>
                        <p class="lead">
                            Enter your email and we'll send you a reset link.
                        </p>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <div class="m-sm-3">

                                <!-- SUCCESS STATE -->
                                <div *ngIf="submitted" class="text-center py-4">
                                    <i data-feather="mail" style="width:48px;height:48px;"
                                        class="text-primary mb-3"></i>
                                    <h4>Check your inbox</h4>
                                    <p class="text-muted">
                                        We sent a password reset link to <strong>{{ email }}</strong>
                                    </p>
                                    <a routerLink="/auth/login" class="btn btn-primary mt-2">
                                        Back to Login
                                    </a>
                                </div>

                                <!-- FORM STATE -->
                                <div *ngIf="!submitted">

                                    <div *ngIf="error" class="alert alert-danger">
                                        {{ error }}
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input class="form-control form-control-lg" type="email"
                                            placeholder="Enter your email" [(ngModel)]="email" required />
                                    </div>

                                    <div class="d-grid gap-2 mt-3">
                                        <button class="btn btn-lg btn-primary" (click)="submit()" [disabled]="loading">
                                            {{ loading ? 'Sending...' : 'Send Reset Link' }}
                                        </button>
                                    </div>

                                    <div class="text-center mt-3">
                                        <a routerLink="/auth/login" class="text-muted">
                                            Back to Login
                                        </a>
                                    </div>

                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>
