<div class="container-fluid p-0">

  <div class="d-flex justify-content-between align-items-center mb-3">

  <!--  <h1 class="h3 mb-0">
      Vehicles
    </h1> -->

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createVehicleModal">

      Create Vehicle

    </button>

  </div>

  <div class="card">

    <div class="card-body">

      <table class="table table-hover">

        <thead>

          <tr>

            <th>Plate Number</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Year</th>
            <th>Admin</th>
            <th>Actions</th>

          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let vehicle of vehicles()">

            <td>{{ vehicle.plateNumber }}</td>

            <td>{{ vehicle.brand }}</td>

            <td>{{ vehicle.model }}</td>

            <td>{{ vehicle.year }}</td>

            <td>{{ vehicle.adminName }}</td>

            <td>

              <button class="btn btn-sm btn-outline-secondary" (click)="viewVehicleDetails(vehicle.id)">

                <i data-feather="eye"></i>

              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

<!-- CREATE VEHICLE MODAL -->

<div class="modal fade" id="createVehicleModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Create Vehicle
        </h5>

        <button type="button" class="btn-close" data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <div class="row g-3">

          <div class="col-md-6">

            <label class="form-label">
              Plate Number
            </label>

            <input class="form-control" [(ngModel)]="plateNumber">

          </div>

          <div class="col-md-6">

            <label class="form-label">
              Brand
            </label>

            <input class="form-control" [(ngModel)]="brand">

          </div>

          <div class="col-md-6">

            <label class="form-label">
              Model
            </label>

            <input class="form-control" [(ngModel)]="model">

          </div>

          <div class="col-md-6">

            <label class="form-label">
              Year
            </label>

            <input type="number" class="form-control" [(ngModel)]="year">

          </div>

        </div>

      </div>

      <div class="modal-footer">

        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">

          Cancel

        </button>

        <button type="button" class="btn btn-primary" (click)="createVehicle()">

          Create Vehicle

        </button>

      </div>

    </div>

  </div>

</div>
