<div class="container-fluid p-0">

  <h1 class="h3 mb-3">
    Vehicles
  </h1>

  <div class="card">


    <div class="card-body">

      <table class="table table-hover">

        <thead>
          <tr>
            <th>Plate Number</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Year</th>
            <th>Admin</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let vehicle of vehicles()">
            <td>{{ vehicle.plateNumber }}</td>
            <td>{{ vehicle.brand }}</td>
            <td>{{ vehicle.model }}</td>
            <td>{{ vehicle.year }}</td>
            <td>{{ vehicle.adminName }}</td>
          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>
