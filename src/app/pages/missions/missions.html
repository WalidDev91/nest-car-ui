<div class="container-fluid p-0">

    <h1 class="h3 mb-3">
        Missions
    </h1>

    <div class="card">
        <div class="card-body">

            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Driver</th>
                        <th>Vehicle</th>
                    </tr>
                </thead>

                <tbody>

                    <tr *ngFor="let mission of missions()">
                        <td>{{ mission.title }}</td>
                        <td>{{ mission.description }}</td>
                        <td>{{ mission.startDate | date:'dd/MM/yyyy' }}</td>
                        <td>{{ mission.endDate | date:'dd/MM/yyyy' }}</td>
                        <td>
                            <span class="badge" [ngClass]="{
      'bg-warning':  mission.status === 'PLANNED',
      'bg-primary':  mission.status === 'ONGOING',
      'bg-success':  mission.status === 'COMPLETED',
      'bg-danger':   mission.status === 'CANCELLED'
    }">
                                {{ mission.status }}
                            </span>
                        </td>
                        <td>{{ mission.driverName }}</td>
                        <td>{{ mission.vehiclePlateNumber }}</td>
                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>
