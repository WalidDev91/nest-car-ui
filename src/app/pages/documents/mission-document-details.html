<div class="container-fluid p-0">

 <!-- <h1 class="h3 mb-3">Mission Document Details</h1> -->

  <div class="row" *ngIf="document() as doc">

    <!-- LEFT: Document Preview -->
    <div class="col-12 col-md-6">
      <div class="card">

        <img
          class="card-img-top"
          [src]="'http://localhost:8080/uploads/mission-documents/' + doc.fileUrl"
          alt="Document preview"
        />

        <div class="card-header">
          <h5 class="card-title mb-0">
            {{ doc.title }}
          </h5>
        </div>

      </div>
    </div>

    <!-- RIGHT: Document Info -->
    <div class="col-12 col-md-6">

      <div class="card">

        <div class="card-header">
          <h5 class="card-title mb-0">
            Information
          </h5>
        </div>

        <div class="card-body">

          <table class="table table-borderless mb-0">
            <tbody>

              <tr>
                <th>Mission</th>
                <td>{{ doc.missionId }}</td>
              </tr>

              <tr>
                <th>Uploaded At</th>
                <td>{{ doc.updatedAt | date:'dd/MM/yyyy HH:mm' }}</td>
              </tr>

            </tbody>
          </table>

          <div class="mt-3">

            <button
              class="btn btn-outline-danger"
              (click)="deleteDocument()">

              Delete Document

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
