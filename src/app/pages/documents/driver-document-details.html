<div class="container-fluid p-0">

  <!-- Back Button -->
  <div class="mb-3">
    <button
      class="btn btn-outline-secondary"
      (click)="goBack()">

      <i data-feather="arrow-left" class="me-1"></i>
      Back

    </button>
  </div>

  <div class="row" *ngIf="document() as doc">

    <!-- LEFT -->
    <div class="col-12 col-lg-6">

      <div class="card">

        <img
          class="card-img-top"
          [src]="'http://localhost:8080/uploads/driver-documents/' + doc.fileUrl"
          alt="Driver document">

      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-12 col-lg-6">

      <div class="card">

        <div class="card-header">
          <h5 class="card-title mb-0">
            Document Information
          </h5>
        </div>

        <div class="card-body">

          <table class="table table-borderless mb-0">

            <tbody>

              <tr>
                <th>Type</th>
                <td>
                  {{ doc.type === 'DRIVER_LICENSE'
                  ? 'Driver License'
                  : 'ID Card' }}
                </td>
              </tr>

              <tr>
                <th>Status</th>
                <td>

                  <span
                    class="badge"
                    [ngClass]="{
                      'bg-warning': doc.status==='PENDING',
                      'bg-success': doc.status==='APPROVED',
                      'bg-danger': doc.status==='REJECTED'
                    }">

                    {{ doc.status }}

                  </span>

                </td>
              </tr>

              <tr>
                <th>Driver</th>
                <td>{{ doc.driverName }}</td>
              </tr>

              <tr>
                <th>Uploaded At</th>
                <td>{{ doc.uploadedAt | date:'dd/MM/yyyy HH:mm' }}</td>
              </tr>

              <tr>
                <th>Validated At</th>
                <td>

                  {{
                  doc.validatedAt
                  ? (doc.validatedAt | date:'dd/MM/yyyy HH:mm')
                  : '—'
                  }}

                </td>
              </tr>

            </tbody>

          </table>

          <hr>

          <!-- Fleet/Admin validation -->

          <div
            *ngIf="canValidate && doc.status==='PENDING'"
            class="mb-3">

            <button
              class="btn btn-success me-2"
              (click)="approve()">

              Approve

            </button>

            <button
              class="btn btn-danger"
              (click)="reject()">

              Reject

            </button>

          </div>

          <!-- Driver actions -->

          <div *ngIf="isDriver">

            <button
              class="btn btn-outline-primary me-2">

              Edit

            </button>

            <button
              class="btn btn-outline-danger"
              (click)="deleteDocument()">

              Delete

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
